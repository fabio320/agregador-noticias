<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agregador de Notícias</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 20px;
        }

        .topo {
            background: #333;
            color: white;
            padding: 10px;
        }

        .usuario {
            float: right;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
        }

        button {
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- TOPO -->
    <div class="topo">
        <h2>📰 Agregador de Notícias</h2>
        <div class="usuario">
            👤 Fabio Franco | ⭐ 75 pts | 🏆 Ativo
        </div>
    </div>

    <!-- NOTÍCIA 1 -->
    <div class="card">
        <h3>Nova tecnologia em IA revoluciona mercado</h3>
        <p>Fonte: TechNews</p>

        <button>👍 Curtir</button>
        <button>💬 Comentar</button>

        <p><b>Comentários:</b></p>
        <ul>
            <li>Muito interessante!</li>
            <li>Isso vai mudar tudo!</li>
        </ul>

        <textarea placeholder="Escreva um comentário"></textarea><br><br>
        <button>Enviar</button>
    </div>

    <!-- NOTÍCIA 2 -->
    <div class="card">
        <h3>Economia apresenta crescimento em 2026</h3>
        <p>Fonte: EcoNews</p>

        <button>👍 Curtir</button>
        <button>💬 Comentar</button>

        <p><b>Comentários:</b></p>
        <ul>
            <li>Ótima notícia!</li>
        </ul>

        <textarea placeholder="Escreva um comentário"></textarea><br><br>
        <button>Enviar</button>
    </div>

</body>
</html>
